name: Autograding Tests
'on':
- push
- repository_dispatch
permissions:
  checks: write
  actions: read
  contents: read
jobs:
  run-autograding-tests:
    runs-on: ubuntu-latest
    if: github.actor != 'github-classroom[bot]'
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Submission Sanity Check
      id: submission-sanity-check
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: Submission Sanity Check
        setup-command: ''
        command: python3 run_test.py
        timeout: 3
    - name: Autograding Reporter
      uses: classroom-resources/autograding-grading-reporter@v1
      env:
        SUBMISSION-SANITY-CHECK_RESULTS: "${{steps.submission-sanity-check.outputs.result}}"
      with:
        runners: submission-sanity-check
